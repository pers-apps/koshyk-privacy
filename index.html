<style>
:root{
  --indigo:#4F6AF5;--mint:#34C78A;--coral:#FF7D5C;--gold:#C9A227;
  --bg:#161B2E;--bg2:#1A2035;--bg3:#1E2640;
  --text:#E8EAF0;--muted:rgba(232,234,240,.55);--dim:rgba(232,234,240,.28);
  --border:rgba(255,255,255,.08);--r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased}
a{color:var(--indigo);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:900px;margin:0 auto;padding:0 24px}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(22,27,46,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;gap:14px;padding:12px 24px;max-width:900px;margin:0 auto}
.nav-logo svg,.nav-logo img{width:32px;height:32px;border-radius:8px;display:block;flex-shrink:0}
.nav-brand{font-size:16px;font-weight:800;letter-spacing:-.3px;white-space:nowrap}
.nav-brand span{color:var(--indigo)}
.nav-spacer{flex:1}
.nav-link{font-size:13px;color:var(--muted);transition:color .2s;white-space:nowrap}
.nav-link:hover{color:var(--text);text-decoration:none}

/* LANGUAGE TOGGLE */
.lang-toggle{display:flex;align-items:center;gap:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;border:none;color:var(--muted);font-family:'Nunito',sans-serif;transition:all .18s;letter-spacing:.3px}
.lang-btn.active{background:var(--indigo);color:#fff}
.lang-btn:hover:not(.active){color:var(--text)}

/* HERO */
.hero{padding:68px 0 60px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(79,106,245,.14) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 100%,rgba(255,125,92,.08) 0%,transparent 70%);pointer-events:none}
.hero-logo-wrap{display:flex;justify-content:center;margin-bottom:24px}

/* LOGO — параметри як вказано */
.hero-logo-img{
  width:96px;
  height:80px;
  border-radius:22px;
  display:block;
}
.hero-logo-placeholder{width:96px;height:80px;border-radius:22px;background:var(--bg3);border:2px dashed rgba(79,106,245,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--dim);font-size:10px}

.hero-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--indigo);background:rgba(79,106,245,.1);border:1px solid rgba(79,106,245,.25);border-radius:999px;padding:4px 14px;margin-bottom:14px}
.hero h1{font-size:clamp(46px,10vw,78px);font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:8px}
.hero-tagline{font-size:clamp(17px,4vw,23px);font-weight:700;color:var(--mint);margin-bottom:12px}
.hero-desc{font-size:15px;color:var(--muted);max-width:480px;margin:0 auto 28px}
.btn-play{display:inline-flex;align-items:center;gap:10px;background:var(--indigo);color:#fff;font-size:15px;font-weight:700;padding:12px 24px;border-radius:12px;transition:background .2s,transform .15s;text-decoration:none}
.btn-play:hover{background:#3d56d4;text-decoration:none;transform:translateY(-1px)}
.hero-note{font-size:12px;color:var(--dim);margin-top:9px}

/* SECTIONS */
section{padding:52px 0}
.section-label{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--mint);margin-bottom:7px}
.section-title{font-size:clamp(22px,5vw,33px);font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.section-sub{font-size:14px;color:var(--muted);max-width:520px;margin-bottom:36px}

/* FEATURES */
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.feat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.feat-card.c-indigo::before{background:var(--indigo)}.feat-card.c-mint::before{background:var(--mint)}.feat-card.c-coral::before{background:var(--coral)}
.feat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:11px}
.feat-icon.c-indigo{background:rgba(79,106,245,.15)}.feat-icon.c-mint{background:rgba(52,199,138,.15)}.feat-icon.c-coral{background:rgba(255,125,92,.15)}
.feat-title{font-size:15px;font-weight:800;margin-bottom:5px}
.feat-text{font-size:13px;color:var(--muted);line-height:1.55}

/* STEPS */
.steps{display:flex;flex-direction:column}
.step{display:flex;gap:18px;align-items:flex-start;padding:18px 0;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step-num{width:36px;height:36px;border-radius:9px;flex-shrink:0;background:rgba(79,106,245,.15);border:1px solid rgba(79,106,245,.3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--indigo)}
.step-body h3{font-size:14px;font-weight:800;margin-bottom:3px}
.step-body p{font-size:13px;color:var(--muted)}

/* USE CASES */
.use-cases{display:flex;flex-wrap:wrap;gap:8px}
.use-chip{display:inline-flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600}
.divider{border:none;border-top:1px solid var(--border);margin:0}

/* PRIVACY */
.privacy-wrap{background:var(--bg2);border-top:1px solid var(--border)}
.privacy-content{padding:52px 24px;max-width:900px;margin:0 auto}
.privacy-content h2{font-size:24px;font-weight:800;margin-bottom:4px}
.eff-date{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.8}
.privacy-content h4{font-size:11px;font-weight:700;color:var(--mint);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 5px}
.privacy-content p,.privacy-content li{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:5px}
.privacy-content ul{padding-left:18px}
.privacy-content li{margin-bottom:2px}

/* FOOTER */
footer{background:var(--bg);border-top:1px solid var(--border);padding:22px 24px;text-align:center}
.footer-inner{max-width:900px;margin:0 auto}
.footer-links{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-bottom:8px}
.footer-links a{font-size:13px;color:var(--muted)}
.footer-links a:hover{color:var(--text)}
.footer-copy{font-size:12px;color:var(--dim)}

@media(max-width:600px){
  .hero{padding:48px 0 40px}
  section{padding:40px 0}
  .nav-link.hide-mob{display:none}
}
</style>
</head>

let lang = localStorage.getItem('koshyk_lang') || 'uk';

function setLang(l) {
  lang = l;
  localStorage.setItem('koshyk_lang', l);
  document.documentElement.lang = l;
  document.getElementById('btn-uk').classList.toggle('active', l==='uk');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[l][el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v.replace(/\n/g,'<br>');
  });
  document.title = l==='uk' ? 'Кошик — рахує за тебе' : 'Koshyk — does the math for you';
}
